<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#070A0F" />
<title>Link a device · Enclave</title>
<!-- device-flow approval page: nothing here is worth indexing -->
<meta name="robots" content="noindex" />
<meta name="description" content="Approve a sign-in you started on another screen." />
<link rel="icon" href="favicon.ico" sizes="48x48 32x32 16x16" />
<link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<script>
/* Cross-document view transitions are skipped by Chromium when extensions
   inject content scripts (MetaMask et al): the old page sees pageswap with
   no viewTransition. Flag it, and the NEXT page (this script runs pre-paint)
   plays the same settle-in itself (html.soft-enter, see base.css) - content
   only, the static header stays put. */
(function(){
  try { if (sessionStorage.getItem("enclave_novt")) { sessionStorage.removeItem("enclave_novt"); document.documentElement.classList.add("soft-enter"); } } catch(e){}
  addEventListener("pageswap", function(e){
    try { if (!e.viewTransition && e.activation) sessionStorage.setItem("enclave_novt", "1"); } catch(e){}
  });
})();
</script>
<link rel="stylesheet" href="css/site.css" />
<script type="module" blocking="render" src="js/boot.js"></script>
</head>
<body>
<c-header current=""></c-header>
<main id="main" tabindex="-1">
<h1 class="sr-only">Link a device</h1>
<section id="link" data-view="link" aria-label="Approve a sign-in">
  <div class="wrap">
    <c-section-head eyebrow="Link a device" heading="Approve a sign-in">
      <p>You scanned this from another screen that wants to be signed in to your Enclave account. Check the details, then approve or deny. Never approve a code you did not start yourself.</p>
    </c-section-head>
    <div id="lkBody" class="co-body">
      <p class="co-note" id="lkGate" hidden>Accounts aren't available yet.</p>
    </div>
  </div>
</section>
</main>
<c-footer></c-footer>
<c-toast></c-toast>
</body>
</html>
